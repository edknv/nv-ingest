name: Release - Helm Chart

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Chart version (e.g. 26.05-RC1)'
        required: true
        type: string
      source-ref:
        description: 'Git ref to build from'
        required: false
        type: string
        default: 'main'
      dry-run:
        description: 'Build chart without publishing to NGC'
        required: false
        type: boolean
        default: false
      chart-name:
        description: 'Helm chart name'
        required: false
        type: string
        default: 'nemo-retriever'

env:
  HELM_CHART_DIR: nemo_retriever/helm

jobs:
  release-helm:
    name: Build & Publish Helm Chart
    runs-on: ubuntu-latest
    env:
      NGC_CLI_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      NGC_CLI_ORG: ${{ secrets.NGC_ORG }}
      NGC_CLI_TEAM: ${{ secrets.NGC_TEAM }}
      NGC_CLI_FORMAT_TYPE: json
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source-ref }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install ngcsdk pyyaml

      - name: Lint Helm chart
        run: helm lint "${HELM_CHART_DIR}"

      - name: Release Helm chart
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python ci/scripts/release_helm_chart.py \
            --org "${{ secrets.NGC_ORG }}" \
            --team "${{ secrets.NGC_TEAM }}" \
            --name "${{ inputs.chart-name }}" \
            --chart-dir "${HELM_CHART_DIR}" \
            --version "${{ inputs.version }}" \
            $DRY_RUN_FLAG

      - name: Upload packaged chart artifact
        if: ${{ inputs.dry-run }}
        uses: actions/upload-artifact@v5
        with:
          name: nemo-retriever-helm-chart
          path: ${{ inputs.chart-name }}-${{ inputs.version }}.tgz
          if-no-files-found: error

      - name: Summary
        run: |
          echo "### Helm Chart Release" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chart source | \`${HELM_CHART_DIR}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Chart | \`${{ inputs.chart-name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ inputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| NGC | \`${{ inputs.chart-name }}:${{ inputs.version }}\` (org/team from repository secrets) |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | \`${{ inputs.dry-run }}\` |" >> $GITHUB_STEP_SUMMARY
