name: Reusable PyPI Build

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string for the release (e.g., 25.4.0)'
        required: false
        type: string
        default: ''
      release-type:
        description: 'Release type (dev or release)'
        required: false
        type: string
        default: 'dev'
      source-ref:
        description: 'Git ref to build from'
        required: false
        type: string
        default: 'main'
      workflow-ref:
        description: 'Git ref of the workflow branch (used to overlay pyproject.toml files)'
        required: false
        type: string
        default: ''
      runner:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'linux-large-disk'
    outputs:
      version:
        description: 'Version that was built'
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    outputs:
      version: ${{ steps.set-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source-ref }}

      - name: Overlay build config from workflow branch
        if: ${{ inputs.workflow-ref != '' && inputs.workflow-ref != inputs.source-ref }}
        run: |
          git fetch --depth=1 origin "${{ inputs.workflow-ref }}"
          git checkout FETCH_HEAD -- nemo_retriever/pyproject.toml

      - name: Determine version
        id: set-version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(date +'%Y.%m.%d')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate release type
        run: |
          if [[ "${{ inputs.release-type }}" != "dev" && "${{ inputs.release-type }}" != "release" ]]; then
            echo "Error: release-type must be 'dev' or 'release'"
            exit 1
          fi

      - name: Install build dependencies
        run: pip install build twine

      - name: Build nemo-retriever wheel
        run: |
          cd nemo_retriever
          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path

          Path("src/nemo_retriever/_build_info.py").write_text(
              '"""Build metadata written by CI before packaging."""\n\n'
              'BUILD_GIT_SHA = "${{ github.sha }}"\n'
              f'BUILD_DATE = "{datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")}"\n',
              encoding="utf-8",
          )
          PY
          RETRIEVER_RELEASE_TYPE=${{ inputs.release-type }} \
          RETRIEVER_VERSION=${{ steps.set-version.outputs.version }} \
          RETRIEVER_BUILD_NUMBER=${{ inputs.release-type == 'release' && '0' || github.run_number }} \
          RETRIEVER_GIT_SHA=${{ github.sha }} \
          python -m build

      - name: Debug — wheels after build
        run: |
          set -x
          echo "=== PyPI build debug (post python -m build) ==="
          echo "pwd=$(pwd)"
          echo "github.sha=${{ github.sha }}"
          echo "version=${{ steps.set-version.outputs.version }}"
          echo "release-type=${{ inputs.release-type }}"
          echo "--- nemo_retriever/dist ---"
          ls -la nemo_retriever/dist/ 2>&1 || echo "(missing nemo_retriever/dist)"
          find nemo_retriever/dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) -ls 2>/dev/null || true
          du -sh nemo_retriever/dist 2>/dev/null || true

      - name: Stage wheels for publish artifact layout
        run: |
          set -euxo pipefail
          # Preserve nemo_retriever/dist/ in the artifact so download-artifact + the
          # legacy publish path ./dist/nemo_retriever/dist/* both work (upload-artifact
          # strips the common parent when uploading bare globs).
          mkdir -p python-wheels-artifact/nemo_retriever/dist
          shopt -s nullglob
          built=(nemo_retriever/dist/*.whl nemo_retriever/dist/*.tar.gz)
          if [ "${#built[@]}" -eq 0 ]; then
            echo "::error::No wheels or sdists in nemo_retriever/dist to stage"
            ls -laR nemo_retriever/dist || true
            exit 1
          fi
          cp -v "${built[@]}" python-wheels-artifact/nemo_retriever/dist/

      - name: Debug — staged artifact tree before upload
        run: |
          set -x
          echo "=== PyPI build debug (pre upload-artifact) ==="
          echo "pwd=$(pwd)"
          echo "github.run_id=${{ github.run_id }}"
          echo "github.run_attempt=${{ github.run_attempt }}"
          echo "--- python-wheels-artifact/ ---"
          find python-wheels-artifact -type f -ls 2>/dev/null || true
          du -sh python-wheels-artifact 2>/dev/null || true
          ls -laR python-wheels-artifact 2>&1 || true

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v5
        with:
          name: python-wheels
          path: python-wheels-artifact/
          retention-days: 7
          if-no-files-found: error
