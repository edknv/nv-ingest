apiVersion: v2
name: nemo-retriever
description: |
  Helm chart for the nemo-retriever ingest service (FastAPI) and its
  optional set of supporting NIM microservices.

  This chart deploys the "service" run mode of nemo-retriever as a single
  scalable web endpoint that orchestrates document ingestion against
  remote NIM endpoints (page-elements, table-structure, OCR, VLM embed).

  In-cluster NIMs are provisioned via NVIDIA NIM Operator custom
  resources (NIMCache + NIMService, apps.nvidia.com/v1alpha1). The
  templates short-circuit when the operator CRDs are absent, so the
  chart degrades gracefully into "external NIM URLs only" mode.

  Persistence today uses SQLite on a PersistentVolumeClaim, which caps
  the service at a single replica. A future iteration will introduce a
  shared PostgreSQL backend so the service can scale horizontally.

type: application
