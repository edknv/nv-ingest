{{- if and (and (.Capabilities.APIVersions.Has "apps.nvidia.com/v1alpha1") .Values.nims.enabled) (eq .Values.nimOperator.audio.enabled true) -}}
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMCache
metadata:
  name: audio
  annotations:
    helm.sh/resource-policy: keep
spec:
  source:
    ngc:
      modelPuller: "{{ .Values.nimOperator.audio.image.repository }}:{{ .Values.nimOperator.audio.image.tag }}"
      pullSecret: "{{ index .Values.nimOperator.audio.image.pullSecrets 0 }}"
      authSecret: {{ .Values.nimOperator.audio.authSecret }}
  storage:
    pvc:
      create: {{ .Values.nimOperator.audio.storage.pvc.create }}
      storageClass: {{ .Values.nimOperator.audio.storage.pvc.storageClass | quote }}
      size: {{ .Values.nimOperator.audio.storage.pvc.size }}
      volumeAccessMode: {{ .Values.nimOperator.audio.storage.pvc.volumeAccessMode }}
---
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: audio
spec:
  image:
    repository: {{ .Values.nimOperator.audio.image.repository }}
    tag: {{ .Values.nimOperator.audio.image.tag }}
    pullPolicy: {{ .Values.nimOperator.audio.image.pullPolicy }}
    pullSecrets:
{{ toYaml .Values.nimOperator.audio.image.pullSecrets | indent 6 }}
  authSecret: {{ .Values.nimOperator.audio.authSecret }}
  storage:
    nimCache:
      name: audio
  replicas: {{ .Values.nimOperator.audio.replicas }}
  nodeSelector:
{{ toYaml .Values.nimOperator.audio.nodeSelector | indent 4 }}
  resources:
{{ toYaml .Values.nimOperator.audio.resources | indent 4 }}
  tolerations:
{{ toYaml .Values.nimOperator.audio.tolerations | indent 4 }}
  expose:
{{ toYaml .Values.nimOperator.audio.expose | indent 4 }}
  env:
{{ toYaml .Values.nimOperator.audio.env | indent 4 }}
{{- end }}
