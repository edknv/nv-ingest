{{/*
Chart-managed NGC pull + auth Secrets.

These two Secrets are referenced *by name* from each NIMCache / NIMService
template under templates/nims/, and from the service Deployment's
imagePullSecrets list. The default names — `ngc-secret` and `ngc-api` —
match the canonical NIM Operator examples and should not normally be
changed.

Set `<block>.create: false` to bring your own (already-present in the
namespace) Secret with the same name.
*/}}
{{- if .Values.ngcImagePullSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ngcImagePullSecret.name }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "nemo-retriever.ngcImagePullSecret" . | quote }}
{{- end }}

{{- if .Values.ngcApiSecret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ngcApiSecret.name }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
type: Opaque
stringData:
  NGC_API_KEY: {{ .Values.ngcApiSecret.password | quote }}
  NGC_CLI_API_KEY: {{ .Values.ngcApiSecret.password | quote }}
{{- end }}
