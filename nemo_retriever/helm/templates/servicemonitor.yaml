{{- /*
ServiceMonitor templates.

A ServiceMonitor is rendered when *either* of these is true:
  • `serviceMonitor.enabled` is explicitly true, OR
  • `topology.mode == "split"` AND `serviceMonitor.autoEnableInSplitMode`
    is true (the chart default).

Split-mode autoscaling depends on Prometheus scraping the worker pods'
``/metrics`` endpoint for the queue-depth + processing-duration series.
Automatically rendering the ServiceMonitor in split mode keeps the
"out of the box" experience working without forcing operators to flip
two unrelated knobs.
*/}}
{{- $auto := and (eq .Values.topology.mode "split") (.Values.serviceMonitor.autoEnableInSplitMode | default false) -}}
{{- if or .Values.serviceMonitor.enabled $auto -}}
{{- if eq .Values.topology.mode "standalone" }}
# =========================================================================
# Standalone mode — single ServiceMonitor
# =========================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "nemo-retriever.fullname" . }}
  {{- with .Values.serviceMonitor.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "nemo-retriever.selectorLabels" . | nindent 6 }}
  {{- with .Values.serviceMonitor.targetLabels }}
  targetLabels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      {{- with .Values.serviceMonitor.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- else }}
# =========================================================================
# Split mode — one ServiceMonitor per role (gateway, realtime, batch).
# `targetLabels` carries the role tag (app.kubernetes.io/component)
# onto every scraped sample so prometheus-adapter and the Grafana
# dashboards can disambiguate pool series across pods.
# =========================================================================
{{- range $role := list "gateway" "realtime" "batch" }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "nemo-retriever.role.fullname" (dict "context" $ "role" $role) }}
  {{- with $.Values.serviceMonitor.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "nemo-retriever.role.labels" (dict "context" $ "role" $role) | nindent 4 }}
    {{- with $.Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "nemo-retriever.role.selectorLabels" (dict "context" $ "role" $role) | nindent 6 }}
  {{- with $.Values.serviceMonitor.targetLabels }}
  targetLabels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  endpoints:
    - port: http
      path: {{ $.Values.serviceMonitor.path }}
      interval: {{ $.Values.serviceMonitor.interval }}
      scrapeTimeout: {{ $.Values.serviceMonitor.scrapeTimeout }}
      {{- with $.Values.serviceMonitor.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
