# Split-topology profile for gateway/realtime/batch readiness coverage.
topology:
  mode: split
  otel:
    enabled: true
  realtime:
    hpa:
      metrics:
        cpu:
          enabled: true
        queueDepthRatio:
          enabled: false
        processingLatencyP95:
          enabled: false
  batch:
    hpa:
      metrics:
        cpu:
          enabled: true
        queueDepthRatio:
          enabled: false
        processingLatencyP95:
          enabled: false

autoscaling:
  queueDepth:
    backend: cpu

serviceConfig:
  vectordb:
    enabled: true

nims:
  enabled: true

nimOperator:
  page_elements:
    enabled: true
  table_structure:
    enabled: true
  ocr:
    enabled: true
  vlm_embed:
    enabled: true
  rerankqa:
    enabled: false
  nemotron_parse:
    enabled: false
  nemotron_3_nano_omni_30b_a3b_reasoning:
    enabled: false
  audio:
    enabled: false
