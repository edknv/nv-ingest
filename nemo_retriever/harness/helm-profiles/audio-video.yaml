# Audio/video managed service profile. The audio NIM is gRPC-only.
service:
  installFfmpeg: true

topology:
  mode: standalone
  otel:
    enabled: false

serviceConfig:
  nimEndpoints:
    audioGrpcEndpoint: "audio:50051"
  vectordb:
    enabled: true

nims:
  enabled: true

nimOperator:
  page_elements:
    enabled: true
  table_structure:
    enabled: true
  ocr:
    enabled: true
  vlm_embed:
    enabled: true
  rerankqa:
    enabled: false
  nemotron_parse:
    enabled: false
  nemotron_3_nano_omni_30b_a3b_reasoning:
    enabled: false
  audio:
    enabled: true
