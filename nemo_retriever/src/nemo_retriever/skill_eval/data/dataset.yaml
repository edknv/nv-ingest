- entry_id: 3
  query_id: 113
  taxonomy_slot_id: C15
  original_query: "prescription drugs included vs excluded under DSCSA"
  paraphrased_prompt: "Find me the section that covers which prescription drugs are included versus excluded under DSCSA. Give me the full relevant section, with page citations."
  ground_truth_pages:
    - {doc_id: "DSCSA_Webinar_October_2021", page_number: 10, score: 2}
    - {doc_id: "DSCSA_Webinar_October_2021", page_number: 24, score: 1}
  ground_truth_answer: "The DSCSA includes most human prescription drugs in finished dosage form for administration to a patient without further manufacturing, such as capsules, tablets, and lyophilized products. However, it excludes certain products including blood or blood components intended for transfusion, radioactive drugs or biologics, imaging drugs, certain IV products, medical gas, homeopathic drugs, and lawfully compounded drugs. Additionally, some products are excluded from the product identifier requirement due to grandfathering or specific waivers, exceptions, or exemptions."

