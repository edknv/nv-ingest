agent_model: claude-opus-4-7
per_trial_budget_usd: 5.0
per_trial_timeout_s: 600
per_trial_workdir_root: /tmp/skill_eval
conditions:
  - c1_base
  - c2_retriever
  - c3_retriever_skill
# Path to the skill source tree the eval should test. Defaults to
# <repo>/.claude/skills/nemo-retriever when unset.
# skill_source_dir: /path/to/.claude/skills/nemo-retriever

# Path to the retriever-sdg agent-eval manifest. Each entry's ``domain`` selects
# the PDF source folder from ``pdf_dirs`` below; the ``prompt_taxonomy.domain_label``
# from the manifest is used in the setup prompt.
eval_manifest_path: ~/git/retriever-sdg-v3/runs/vidore_v3_agent_evals_20260513_batch_1/eval_manifest.json

# Per-domain PDF roots. Keys must match the ``domain`` field on each manifest entry.
pdf_dirs:
  vidore_v3_pharmaceuticals: ~/git/retriever-sdg-v3/test-data/vidorev3-fda/pdfs
  vidore_v3_finance_en: ~/git/retriever-sdg-v3/test-data/vidorev3-finance/pdfs
  vidore_v3_hr: ~/git/retriever-sdg-v3/test-data/vidorev3-hr/pdfs

# LLM-as-judge scoring of each query turn's final_answer against the manifest's
# ground-truth answer. Skipped silently when the api_key_env var is unset.
judge:
  enabled: true
  model: nvidia_nim/mistralai/mixtral-8x22b-instruct-v0.1
  api_base: https://integrate.api.nvidia.com/v1
  api_key_env: NVIDIA_API_KEY
